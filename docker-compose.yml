name: adb-prod

services:
  mongo:
    image: mongo:7
    container_name: adb-prod-mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: advance
      MONGO_INITDB_ROOT_PASSWORD: bot
    ports:
      - "27018:27017"
    volumes:
      - mongo-prod-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.runCommand({ ping: 1 })"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NODE_ENV: production
    container_name: adb-prod-bot
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - ./.env
    working_dir: /app
    command: ["npm", "start"]

volumes:
  mongo-prod-data:
